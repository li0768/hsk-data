<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>智能中文助教 · 学术导航 | 精雅平衡·对齐版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', 'Segoe UI', system-ui, -apple-system, 'SF Pro Text', 'Roboto', sans-serif;
            /* 保留原有渐变背景：顶部雅致蓝 → 柔和白 */
            background: linear-gradient(180deg, 
                #C2DBFF 0%,
                #CCE3FF 6%,
                #D9EAFF 15%,
                #E6F0FF 28%,
                #F0F6FF 48%,
                #F8FBFE 72%,
                #FFFFFF 90%,
                #FFFFFF 100%
            );
            min-height: 100vh;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
            background-attachment: fixed;
            overflow: hidden;
        }

        /* 柔和光晕装饰 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.4) 0%, rgba(96, 165, 250, 0.08) 70%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-accent {
            position: fixed;
            top: -10%;
            right: -5%;
            width: 45%;
            height: 45%;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
        }

        /* 主容器 - 宽度适中，留白舒适，同时保证四宫格边缘与返回键左端对齐 */
        .nav-container {
            max-width: 1080px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            gap: 0;
            height: 100%;
            max-height: 100vh;
            padding: 0 1.8rem;
        }

        /* ========= 头部区域 ========= */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            margin-bottom: 0.3rem;
            flex-shrink: 0;
        }

        /* 返回按钮 - 优雅圆润胶囊，位于左侧，与卡片左边缘对齐（通过父容器padding保证视觉） */
        .back-btn {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 0.6rem 1.2rem 0.6rem 1rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #2c5a82;
            font-size: 0.95rem;
            font-weight: 520;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            letter-spacing: 0.3px;
            cursor: pointer;
            z-index: 2;
            font-family: inherit;
        }

        .back-btn i {
            font-size: 0.9rem;
            transition: transform 0.2s ease;
        }

        .back-btn span {
            display: inline-block;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.98);
            border-color: rgba(59, 130, 246, 0.65);
            color: #1e4a76;
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.12);
            transform: translateY(-50%) translateX(-2px);
        }

        .back-btn:hover i {
            transform: translateX(-3px);
        }

        .back-btn:active {
            transform: translateY(-50%) scale(0.97);
        }

        /* 主标题：醒目深蓝横向渐变，字号放大显眼 */
        .main-title {
            font-size: 2.7rem;
            font-weight: 630;
            letter-spacing: -0.3px;
            background: linear-gradient(115deg, #0A3E6D 0%, #1B5A8C 25%, #2A6FA8 50%, #1F5E8E 75%, #0C4675 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 5px rgba(10, 62, 109, 0.1);
            text-align: center;
            position: relative;
            display: inline-block;
            padding: 0 0.5rem;
        }

        /* 优雅装饰线 */
        .main-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 2.5px;
            background: linear-gradient(90deg, rgba(26, 86, 128, 0.1), #2F6EB3, #1B5A8C, #2F6EB3, rgba(26, 86, 128, 0.1));
            border-radius: 2px;
            opacity: 0.7;
        }

        /* ========= 四宫格 - 宽度与返回按钮左端对齐（通过设置左侧margin为0，与父容器padding配合） ========= */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.3rem;
            width: 100%;
            max-width: 100%;
            margin-top: 0.9rem;
            margin-bottom: 0.25rem;
            flex-shrink: 0;
            /* 确保四宫格内容起始位置与返回按钮左端对齐（返回按钮left:0，父容器有padding，所以自然对齐） */
        }

        /* 卡片：精致放大，轮廓清晰 */
        .nav-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 18px -10px rgba(31, 84, 136, 0.2), 
                        0 0 0 1px rgba(79, 129, 189, 0.45),
                        0 0 0 3px rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.9);
            transition: all 0.35s cubic-bezier(0.2, 0.85, 0.3, 1.05);
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .nav-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 20px 28px -14px rgba(26, 86, 128, 0.28), 
                        0 0 0 1.8px rgba(47, 110, 179, 0.7),
                        0 0 0 6px rgba(255, 255, 255, 0.88);
            border-color: rgba(255, 255, 255, 1);
        }

        .nav-card:active {
            transform: scale(0.98);
        }

        /* 图片区域 - 比例舒适 */
        .card-image {
            width: 100%;
            aspect-ratio: 16 / 6.2;
            background: linear-gradient(135deg, #EFF6FE, #E6F0FD);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .card-img.error {
            display: none;
        }

        .img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F3F9FF, #EAF2FC);
            color: #5A86B9;
            font-size: 1.6rem;
        }

        .nav-card:hover .card-img {
            transform: scale(1.02);
        }

        /* 卡片文字区域 - 舒适留白 */
        .card-content {
            padding: 0.6rem 0.7rem 0.7rem 0.7rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(2px);
            border-top: 1px solid rgba(79, 129, 189, 0.2);
        }

        .card-main-title {
            font-size: 1.24rem;
            font-weight: 600;
            color: #1F5488;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .card-sub-desc {
            font-size: 0.68rem;
            color: #5C7FA3;
            font-weight: 460;
            line-height: 1.28;
            padding: 0 0.1rem;
        }

        /* 底部信息栏 - 与卡片间距适中 */
        .footer {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 0.8rem;
            flex-shrink: 0;
        }

        .tech-row {
            display: flex;
            justify-content: center;
            gap: 1.3rem;
            font-size: 0.65rem;
            font-weight: 450;
            color: #5C7FA3;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            padding: 0.35rem 1.6rem;
            border-radius: 48px;
            border: 1px solid rgba(79, 129, 189, 0.35);
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
        }

        .tech-row span {
            display: inline-block;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.2px;
        }

        /* 确保整体无滚动 */
        body {
            overflow: hidden;
        }

        /* ========= 响应式优化：整体放大但留白合理，并保证对齐 ========= */
        @media (max-height: 820px) {
            .nav-container { padding: 0 1.6rem; }
            .main-title { font-size: 2.5rem; }
            .main-title::after { bottom: -10px; width: 58px; }
            .nav-grid { margin-top: 0.75rem; gap: 1.2rem; }
            .card-image { aspect-ratio: 16 / 6; }
            .card-content { padding: 0.55rem 0.65rem 0.65rem; }
            .card-main-title { font-size: 1.18rem; }
            .footer { margin-top: 0.7rem; }
        }

        @media (max-height: 760px) {
            .main-title { font-size: 2.3rem; }
            .main-title::after { bottom: -9px; width: 54px; height: 2px; }
            .nav-grid { margin-top: 0.65rem; gap: 1rem; }
            .card-image { aspect-ratio: 16 / 5.8; }
            .card-content { padding: 0.5rem 0.6rem 0.6rem; }
            .card-main-title { font-size: 1.12rem; }
            .card-sub-desc { font-size: 0.64rem; }
            .back-btn { padding: 0.55rem 1.1rem 0.55rem 0.95rem; }
            .back-btn i, .back-btn span { font-size: 0.88rem; }
            .footer { margin-top: 0.6rem; }
        }

        @media (max-height: 680px) {
            .main-title { font-size: 2.1rem; }
            .main-title::after { bottom: -8px; width: 48px; height: 1.8px; }
            .nav-grid { margin-top: 0.55rem; gap: 0.9rem; }
            .card-image { aspect-ratio: 16 / 5.5; }
            .card-content { padding: 0.45rem 0.55rem 0.55rem; }
            .card-main-title { font-size: 1.05rem; }
            .card-sub-desc { font-size: 0.6rem; }
            .back-btn { padding: 0.45rem 0.95rem 0.45rem 0.85rem; }
            .footer { margin-top: 0.5rem; }
        }

        @media (max-height: 620px) {
            .main-title { font-size: 1.95rem; }
            .nav-grid { margin-top: 0.45rem; gap: 0.8rem; }
            .card-image { aspect-ratio: 16 / 5.2; }
            .card-main-title { font-size: 0.98rem; }
            .card-sub-desc { font-size: 0.56rem; }
            .img-placeholder { font-size: 1.3rem; }
            .footer { margin-top: 0.4rem; }
            .tech-row { padding: 0.25rem 1.2rem; gap: 1rem; }
        }

        /* 宽度响应：整体放大但边缘对齐保持不变 */
        @media (min-width: 1100px) {
            .nav-container { max-width: 1100px; padding: 0 2rem; }
            .main-title { font-size: 2.9rem; }
            .nav-grid { gap: 1.5rem; }
            .card-main-title { font-size: 1.28rem; }
            .footer { margin-top: 0.9rem; }
        }

        @media (max-width: 900px) {
            .nav-container { padding: 0 1.4rem; }
            .nav-grid { gap: 1.1rem; }
        }

        @media (max-width: 800px) {
            .main-title { font-size: 2.3rem; }
            .nav-grid { margin-top: 0.7rem; gap: 1rem; }
            .card-main-title { font-size: 1.1rem; }
            .card-image { aspect-ratio: 16 / 5.9; }
        }

        @media (max-width: 700px) {
            .main-title { font-size: 2.1rem; }
            .nav-grid { margin-top: 0.6rem; gap: 0.9rem; }
            .card-main-title { font-size: 1.02rem; }
            .img-placeholder { font-size: 1.3rem; }
        }

        @media (max-width: 600px) {
            .main-title { font-size: 1.9rem; }
            .nav-grid { margin-top: 0.55rem; gap: 0.85rem; }
            .card-main-title { font-size: 0.96rem; }
            .card-sub-desc { font-size: 0.58rem; }
            .back-btn span { display: none; }
            .back-btn { padding: 0.5rem 0.9rem; gap: 0; }
            .back-btn i { font-size: 1rem; }
            .footer { margin-top: 0.55rem; }
        }

        /* 手机竖屏：单列模式，且返回按钮与卡片左边缘自然对齐 */
        @media (max-width: 580px) {
            .nav-container { padding: 0 1.2rem; }
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 0.85rem;
                max-width: 300px;
                margin-top: 0.6rem;
                margin-left: 0;
                margin-right: auto;
            }
            .header {
                flex-direction: column;
                gap: 0.2rem;
                padding-top: 0.1rem;
            }
            .main-title { 
                font-size: 2rem; 
                text-align: center;
                margin-top: 0.1rem;
            }
            .main-title::after {
                bottom: -8px;
                width: 52px;
            }
            .back-btn {
                position: relative;
                top: 0;
                left: 0;
                transform: none;
                margin-bottom: 0.3rem;
                align-self: flex-start;
                background: rgba(255, 255, 255, 0.88);
                border-radius: 32px;
                padding: 0.45rem 1rem;
            }
            .back-btn span { 
                display: inline-block;
                font-size: 0.85rem;
            }
            .back-btn i { font-size: 0.9rem; }
            .back-btn:hover {
                transform: translateX(-2px);
            }
            .card-image { aspect-ratio: 16 / 5.2; }
            .card-content { padding: 0.45rem 0.55rem 0.55rem; }
            .footer { margin-top: 0.6rem; }
            .tech-row { gap: 0.7rem; padding: 0.25rem 1rem; }
            body { overflow: hidden; }
        }

        @media (max-width: 480px) {
            .nav-container { padding: 0 1rem; }
            .main-title { font-size: 1.75rem; }
            .main-title::after { bottom: -7px; width: 46px; height: 1.8px; }
            .nav-grid { max-width: 270px; gap: 0.75rem; margin-top: 0.5rem; }
            .card-main-title { font-size: 0.92rem; }
            .card-sub-desc { font-size: 0.54rem; }
            .back-btn span { font-size: 0.8rem; }
            .back-btn { padding: 0.4rem 0.85rem; }
            .footer { margin-top: 0.5rem; }
            .tech-row span { font-size: 0.55rem; }
        }

        /* 超高屏适配，保持放大美感 */
        @media (min-height: 950px) {
            .nav-grid { margin-top: 1.1rem; gap: 1.6rem; }
            .footer { margin-top: 1rem; }
            .main-title { font-size: 3rem; }
        }

        /* 极窄高度允许轻微滚动，但优先一屏展示 */
        @media (max-height: 540px) and (min-width: 700px) {
            body {
                overflow-y: auto;
            }
            .nav-container {
                justify-content: flex-start;
                padding: 0.3rem 1.5rem;
            }
            .nav-grid {
                margin-top: 0.4rem;
            }
        }

        /* 卡片轮廓精致增强 */
        .nav-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            pointer-events: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.7), inset 0 -1px 0 rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

<div class="bg-accent"></div>

<div class="nav-container">
    <!-- 头部：返回胶囊 + 醒目渐变标题 -->
    <div class="header">
        <a href="test.html" class="back-btn" title="返回上一页">
            <i class="fas fa-arrow-left"></i>
            <span>返回</span>
        </a>
        <div class="main-title">智能中文助教导航</div>
    </div>

    <!-- 四宫格卡片：宽度舒展，左右边缘与返回按钮左端视觉对齐（父容器padding保证不贴边） -->
    <div class="nav-grid">
        <!-- 卡片1：HSK分级 -->
        <a href="HSK分级.html" class="nav-card">
            <div class="card-image">
                <img src="images/zhinan.jpg" 
                     alt="HSK分级" 
                     class="card-img" 
                     onerror="this.classList.add('error'); this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="img-placeholder" style="display: none;">
                    <i class="fas fa-compass"></i>
                </div>
            </div>
            <div class="card-content">
                <div class="card-main-title">HSK分级</div>
                <div class="card-sub-desc">智能预测文本难度 · 深度解析词汇分布</div>
            </div>
        </a>

        <!-- 卡片2：文本完整分析 -->
        <a href="教材分析.html" class="nav-card">
            <div class="card-image">
                <img src="images/fenxi.jpg" 
                     alt="教材分析" 
                     class="card-img"
                     onerror="this.classList.add('error'); this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="img-placeholder" style="display: none;">
                    <i class="fas fa-chart-line"></i>
                </div>
            </div>
            <div class="card-content">
                <div class="card-main-title">教材分析</div>
                <div class="card-sub-desc">总结教材文本主题 · 一键生成教学建议</div>
            </div>
        </a>

        <!-- 卡片3：词语搭配 -->
        <a href="词语搭配.html" class="nav-card">
            <div class="card-image">
                <img src="images/dapei.jpg" 
                     alt="词语搭配" 
                     class="card-img"
                     onerror="this.classList.add('error'); this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="img-placeholder" style="display: none;">
                    <i class="fas fa-link"></i>
                </div>
            </div>
            <div class="card-content">
                <div class="card-main-title">词语搭配</div>
                <div class="card-sub-desc">输入任意词语 · 获取海量词语搭配例句</div>
            </div>
        </a>

        <!-- 卡片4：汉语词典（外链汉典） -->
        <a href="https://www.zdic.net/" target="_blank" rel="noopener noreferrer" class="nav-card">
            <div class="card-image">
                <img src="images/cidian.jpg" 
                     alt="汉语词典" 
                     class="card-img"
                     onerror="this.classList.add('error'); this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="img-placeholder" style="display: none;">
                    <i class="fas fa-book"></i>
                </div>
            </div>
            <div class="card-content">
                <div class="card-main-title">汉语词典</div>
                <div class="card-sub-desc">汉典权威释义 · 字词训诂与成语探源</div>
            </div>
        </a>
    </div>

    <!-- 底部信息栏 -->
    <div class="footer">
        <div class="tech-row">
            <span>127.0.0.1:5000</span>
            <span>qwen3:8b / deepseek</span>
            <span>学术助教 · 智识引擎</span>
        </div>
    </div>
</div>

<script>
    // 图片加载失败回退占位符
    document.querySelectorAll('.nav-card').forEach((card) => {
        const imgElement = card.querySelector('.card-img');
        const placeholder = card.querySelector('.img-placeholder');
        if (imgElement && placeholder) {
            if (imgElement.complete && imgElement.naturalWidth === 0) {
                imgElement.style.display = 'none';
                placeholder.style.display = 'flex';
            }
            imgElement.onerror = function() {
                this.style.display = 'none';
                if (placeholder) placeholder.style.display = 'flex';
            };
        }
    });

    // 确保占位符样式统一
    const styleFix = document.createElement('style');
    styleFix.textContent = `
        .img-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F5FAFF, #EBF3FE);
            color: #618BC7;
            font-size: 1.5rem;
            width: 100%;
            height: 100%;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .nav-card:hover .card-content {
            background: rgba(255, 255, 255, 0.72);
        }
        @media (max-width: 600px) {
            .back-btn span {
                display: none;
            }
        }
        @media (max-width: 580px) {
            .back-btn span {
                display: inline-block;
            }
        }
    `;
    document.head.appendChild(styleFix);
</script>

</body>
</html>
